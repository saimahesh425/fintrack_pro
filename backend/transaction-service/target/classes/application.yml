spring:
  application:
    name: transaction-service

  # ✅ Disable Redis completely (IMPORTANT FIX)
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  # H2 Database
  datasource:
    url: jdbc:h2:mem:fintrackdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  # Kafka (will not fail if not running unless used)
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: transaction-processor
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        spring.json.trusted.packages: "com.fintrack.*"

  # Security
  security:
    jwt:
      secret: "fintrack-local-dev-secret-key-min-256-bits-long"
      expiration-ms: 86400000

server:
  port: 8081

# Business rules
rules:
  aml:
    threshold: 10000
  velocity:
    max-per-hour: 20
  risk:
    flag-threshold: 50
    aml-score: 40
    velocity-score: 30
    duplicate-score: 60

# CORS
app:
  cors:
    allowed-origins: "http://localhost:4200"

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: false   # ✅ prevent DOWN status

# Logging
logging:
  level:
    com.fintrack: DEBUG
    org.springframework.kafka: INFO

# Swagger
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

---
# AWS PROFILE (leave as is)
spring:
  config:
    activate:
      on-profile: aws

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS}