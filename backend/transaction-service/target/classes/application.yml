# ── Default (local) configuration ─────────────────────────────────────────
spring:
  application:
    name: transaction-service

  # H2 in-memory database for local development
  datasource:
    url: jdbc:h2:mem:fintrackdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true          # http://localhost:8081/h2-console (local only)
      path: /h2-console

  # Kafka
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer:   org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all             # Wait for all replicas
      retries: 3
    consumer:
      group-id: transaction-processor
      key-deserializer:   org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false   # Manual acknowledgment
      properties:
        spring.json.trusted.packages: "com.fintrack.*"

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  # Security — JWT
  security:
    jwt:
      secret: "fintrack-local-dev-secret-key-min-256-bits-long-replace-in-prod"
      expiration-ms: 86400000   # 24 hours

server:
  port: 8081

# ── Rule engine thresholds (override via ConfigMap in K8s) ─────────────────
rules:
  aml:
    threshold: 10000
  velocity:
    max-per-hour: 20
  risk:
    flag-threshold: 50
    aml-score: 40
    velocity-score: 30
    duplicate-score: 60

# ── CORS ────────────────────────────────────────────────────────────────────
app:
  cors:
    allowed-origins: "http://localhost:4200"

# ── Actuator ────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always

# ── Logging ─────────────────────────────────────────────────────────────────
logging:
  level:
    com.fintrack: DEBUG
    org.springframework.kafka: INFO

# ── Swagger ─────────────────────────────────────────────────────────────────
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

---
# ── AWS profile (activated by SPRING_PROFILES_ACTIVE=aws) ─────────────────
spring:
  config:
    activate:
      on-profile: aws

  datasource:
    url: ${DB_URL}                   # Injected from K8s Secret
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 5000

  jpa:
    hibernate:
      ddl-auto: validate            # Never auto-migrate in production
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

  data:
    redis:
      host: ${REDIS_HOST}
      port: 6379
      password: ${REDIS_PASSWORD}

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS}
