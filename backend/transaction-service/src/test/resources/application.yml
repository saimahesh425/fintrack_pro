spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop

  # 🔥 DISABLE REDIS COMPLETELY
  data:
    redis:
      repositories:
        enabled: false

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

server:
  port: 0

# REQUIRED CONFIG
app:
  cors:
    allowed-origins: "*"

rules:
  aml:
    threshold: 10000
  velocity:
    max-per-hour: 20
  risk:
    flag-threshold: 50
    aml-score: 40
    velocity-score: 30
    duplicate-score: 60

logging:
  level:
    com.fintrack: WARN