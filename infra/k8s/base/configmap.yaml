apiVersion: v1
kind: ConfigMap
metadata:
  name: transaction-service-config
  namespace: fintrack
data:
  # Spring profiles
  SPRING_PROFILES_ACTIVE: "aws"

  # Rule engine thresholds — edit here, no code change needed
  RULES_AML_THRESHOLD: "10000"
  RULES_VELOCITY_MAX_PER_HOUR: "20"
  RULES_RISK_FLAG_THRESHOLD: "50"
  RULES_RISK_AML_SCORE: "40"
  RULES_RISK_VELOCITY_SCORE: "30"
  RULES_RISK_DUPLICATE_SCORE: "60"

  # App config
  SERVER_PORT: "8081"
  APP_CORS_ALLOWED_ORIGINS: "https://fintrack.yourdomain.com"
