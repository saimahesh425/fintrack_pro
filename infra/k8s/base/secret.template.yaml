# ─────────────────────────────────────────────────────────────────────────────
# DO NOT commit real values — this is a template only.
# In production: inject via AWS Secrets Manager + External Secrets Operator,
# or seal with Sealed Secrets / Vault Agent Sidecar.
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: fintrack-secrets
  namespace: fintrack
type: Opaque
stringData:
  # Database (AWS RDS MS SQL Server)
  DB_URL:      "jdbc:sqlserver://<RDS_ENDPOINT>:1433;databaseName=fintrack"
  DB_USERNAME: "<DB_USER>"
  DB_PASSWORD: "<DB_PASSWORD>"

  # Redis (AWS ElastiCache)
  REDIS_HOST:     "<ELASTICACHE_ENDPOINT>"
  REDIS_PASSWORD: "<REDIS_AUTH_TOKEN>"

  # Kafka (MSK or self-hosted on EKS)
  KAFKA_BOOTSTRAP_SERVERS: "<MSK_BOOTSTRAP_SERVERS>"

  # OpenAI
  OPENAI_API_KEY: "<YOUR_OPENAI_API_KEY>"

  # JWT signing secret
  SPRING_SECURITY_JWT_SECRET: "<MIN_256_BIT_SECRET>"
